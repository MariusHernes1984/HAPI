name: Build and deploy HAPI Orchestrator

on:
  push:
    branches:
      - master
    paths:
      - 'foundry-agenter/orchestrator/**'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/mariushernes1984/hapi-orchestrator

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./foundry-agenter/orchestrator
          file: ./foundry-agenter/orchestrator/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
