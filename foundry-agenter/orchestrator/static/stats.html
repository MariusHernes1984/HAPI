<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/design-tokens.css">
  <title>HAPI — Data Statistikk</title>
  <style>
    :root {
      --primary: #0d6e6e;
      --primary-light: #0f8a8a;
      --primary-dark: #094e4e;
      --accent: #28a87d;
      --accent-light: #d0f0e4;
      --bg: #f0f5f4;
      --text: #1a2e2e;
      --text-light: #5a7272;
      --border: #d4e0df;
      --shadow: 0 2px 12px rgba(13,110,110,0.08);
      --shadow-lg: 0 8px 32px rgba(13,110,110,0.12);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
    }

    /* Accessibility: respect user motion preferences */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Accessibility: visible focus for keyboard users */
    :focus-visible {
      outline: 2px solid var(--primary-light);
      outline-offset: 2px;
      border-radius: 6px;
    }

    header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.15);
    }

    .logo {
      width: 44px; height: 44px;
      border-radius: 12px;
      flex-shrink: 0;
      display: block;
    }

    .header-text h1 { font-size: 1.2rem; font-weight: 600; letter-spacing: -0.02em; }
    .header-text p { font-size: 0.78rem; opacity: 0.8; margin-top: 1px; }

    .header-back {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.12);
      padding: 6px 14px; border-radius: 20px;
      font-size: 0.78rem; font-weight: 500;
      color: white; text-decoration: none;
      transition: background 0.2s;
    }
    .header-back:hover { background: rgba(255,255,255,0.22); }

    .container { max-width: 1060px; margin: 0 auto; padding: 24px; }

    /* --- KPI Hero --- */
    .kpi-hero {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 14px;
      margin-bottom: 24px;
    }

    .kpi-card {
      background: white;
      border-radius: var(--radius-sm);
      padding: 20px 18px;
      text-align: center;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .kpi-card.highlight {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      border-color: transparent;
    }
    .kpi-card.highlight .kpi-label { color: rgba(255,255,255,0.8); }
    .kpi-card.highlight .kpi-value { color: white; }
    .kpi-card.highlight .kpi-sub { color: rgba(255,255,255,0.7); }

    .kpi-value {
      font-size: 2.2rem; font-weight: 700;
      color: var(--primary); line-height: 1.1;
    }
    .kpi-value.green { color: #16a34a; }
    .kpi-value.red { color: #dc2626; }

    .kpi-label {
      font-size: 0.78rem; color: var(--text-light);
      margin-top: 4px; font-weight: 500;
    }

    .kpi-sub {
      font-size: 0.7rem; color: var(--text-light);
      margin-top: 2px;
    }

    /* --- Phase Timeline --- */
    .phase-timeline {
      background: white;
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .phase-timeline h2 {
      font-size: 1.05rem; color: var(--primary); margin-bottom: 4px;
    }
    .phase-timeline .subtitle {
      font-size: 0.78rem; color: var(--text-light); margin-bottom: 20px;
    }

    .phase-chart-container {
      position: relative; width: 100%; height: 280px;
    }

    canvas { width: 100% !important; height: 100% !important; }

    /* --- Phase Accordion --- */
    .phase-group {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .phase-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
      width: 100%;
      background: white;
      border: none;
      font-family: inherit;
      color: inherit;
      text-align: left;
      min-height: 60px;
    }
    .phase-header:hover { background: #f8fafa; }

    .phase-chevron {
      width: 20px; height: 20px;
      transition: transform 0.2s;
      color: var(--text-light);
      flex-shrink: 0;
    }
    .phase-group.open .phase-chevron { transform: rotate(90deg); }

    .phase-name {
      font-size: 1rem; font-weight: 600; color: var(--primary);
      min-width: 80px;
    }

    .phase-meta {
      display: flex; gap: 16px; align-items: center;
      font-size: 0.78rem; color: var(--text-light);
      flex: 1;
    }

    .phase-score {
      font-size: 1.1rem; font-weight: 700;
      min-width: 50px; text-align: right;
    }

    .phase-sparkline {
      width: 120px; height: 32px; flex-shrink: 0;
    }

    .phase-bar {
      display: flex; height: 6px; border-radius: 3px;
      overflow: hidden; background: #e5e7eb; width: 100px;
      flex-shrink: 0;
    }
    .phase-bar .seg-b { background: #16a34a; }
    .phase-bar .seg-d { background: #eab308; }
    .phase-bar .seg-m { background: #f97316; }
    .phase-bar .seg-f { background: #dc2626; }

    .phase-body {
      display: none;
      border-top: 1px solid var(--border);
    }
    .phase-group.open .phase-body { display: block; }

    .phase-runs-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .phase-runs {
      width: 100%; border-collapse: collapse; font-size: 0.8rem;
      min-width: 520px;
    }
    .phase-runs th {
      text-align: left; padding: 8px 14px;
      background: #f0f5f4; color: var(--primary);
      font-weight: 600; border-bottom: 2px solid var(--border);
      font-size: 0.76rem;
      white-space: nowrap;
    }
    .phase-runs td {
      padding: 8px 14px; border-bottom: 1px solid var(--border);
    }
    .phase-runs tr { cursor: pointer; }
    .phase-runs tr:hover td { background: #f8fafa; }

    .score-bar {
      display: flex; height: 8px; border-radius: 4px;
      overflow: hidden; background: #e5e7eb; min-width: 80px;
    }
    .score-bar .seg-bestatt { background: #16a34a; }
    .score-bar .seg-delvis { background: #eab308; }
    .score-bar .seg-mangler { background: #f97316; }
    .score-bar .seg-feil { background: #dc2626; }

    .tag-chip {
      display: inline-block;
      background: var(--accent-light);
      color: var(--primary-dark);
      padding: 2px 8px; border-radius: 8px;
      font-size: 0.7rem; font-weight: 500;
    }

    .hall-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #dc2626;
    }

    .loading-state {
      text-align: center; padding: 48px; color: var(--text-light);
    }
    .loading-state .spinner {
      width: 24px; height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- Drill-down modal --- */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 100;
      justify-content: center; align-items: flex-start;
      padding: 32px 16px; overflow-y: auto;
    }
    .modal-overlay.active { display: flex; }

    .modal {
      background: white; border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      max-width: 900px; width: 100%;
      max-height: calc(100vh - 64px); overflow-y: auto;
    }

    .modal-header {
      position: sticky; top: 0;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white; padding: 18px 24px;
      border-radius: var(--radius) var(--radius) 0 0;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 1;
    }
    .modal-header h2 { font-size: 1.05rem; font-weight: 600; }
    .modal-header p { font-size: 0.78rem; opacity: 0.8; margin-top: 2px; }

    .modal-close {
      background: rgba(255,255,255,0.15); border: none;
      color: white; width: 32px; height: 32px;
      border-radius: 8px; font-size: 1.2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .modal-close:hover { background: rgba(255,255,255,0.25); }

    .modal-body { padding: 24px; }

    .modal-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px; margin-bottom: 20px;
    }
    .modal-summary .summary-card {
      background: white; border-radius: var(--radius-sm);
      padding: 12px 10px; text-align: center;
      box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .modal-summary .summary-card .value { font-size: 1.3rem; font-weight: 700; color: var(--primary); }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .detail-table th {
      text-align: left; padding: 8px 10px;
      background: #f0f5f4; color: var(--primary);
      font-weight: 600; border-bottom: 2px solid var(--border);
      position: sticky; top: 0;
    }
    .detail-table td {
      padding: 8px 10px; border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .detail-table tr:hover td { background: #f8fafa; }

    .score-badge {
      display: inline-block; padding: 2px 8px;
      border-radius: 6px; font-size: 0.72rem; font-weight: 600;
    }
    .score-badge.bestatt { background: #dcfce7; color: #15803d; }
    .score-badge.delvis { background: #fef9c3; color: #a16207; }
    .score-badge.mangler { background: #ffedd5; color: #c2410c; }
    .score-badge.feil { background: #fee2e2; color: #dc2626; }
    .score-badge.hallusinering { background: #fce7f3; color: #be185d; }

    .detail-reasoning {
      font-size: 0.75rem; color: var(--text-light);
      margin-top: 4px; line-height: 1.4;
    }
    .detail-answer {
      font-size: 0.74rem; color: var(--text);
      background: #f8fafa; padding: 8px 10px;
      border-radius: 6px; margin-top: 6px;
      max-height: 120px; overflow-y: auto;
      white-space: pre-wrap; border: 1px solid var(--border);
    }
    .routing-info { display: flex; gap: 4px; flex-wrap: wrap; }
    .routing-chip {
      font-size: 0.68rem; padding: 1px 6px;
      border-radius: 4px; background: #e0f2fe; color: #0369a1;
    }
    .routing-chip.wrong { background: #fee2e2; color: #dc2626; }

    .expandable { cursor: pointer; }
    .expandable .expand-content { display: none; }
    .expandable.open .expand-content { display: block; }

    /* Phase description */
    .phase-desc {
      font-size: 0.74rem; color: var(--text-light);
      padding: 10px 20px; background: #f8fafa;
      border-bottom: 1px solid var(--border);
    }

    @media (max-width: 640px) {
      header { padding: 12px 14px; gap: 10px; }
      .logo { width: 38px; height: 38px; }
      .header-text h1 { font-size: 1rem; }
      .header-text p { font-size: 0.7rem; }
      .header-back {
        width: 40px; height: 40px; padding: 0;
        border-radius: 50%; justify-content: center;
      }
      .header-back .back-text { display: none; }

      .container { padding: 16px; }
      .kpi-hero { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .kpi-value { font-size: 1.8rem; }
      .kpi-card { padding: 16px 12px; }

      .phase-timeline { padding: 16px; }
      .phase-chart-container { height: 240px; }

      /* Stack accordion header on mobile */
      .phase-header {
        flex-wrap: wrap;
        gap: 10px 12px;
        padding: 14px 16px;
      }
      .phase-sparkline { display: none; }
      .phase-name { min-width: 0; flex: 1; }
      .phase-score { margin-left: auto; }
      .phase-meta {
        order: 3;
        flex-basis: 100%;
        gap: 12px;
        font-size: 0.74rem;
      }
      .phase-bar { width: 100%; flex: 1; min-width: 80px; }

      /* Hide secondary columns on mobile — data is in the bar */
      .col-secondary { display: none; }
      .phase-runs { min-width: 340px; font-size: 0.78rem; }
      .phase-runs th, .phase-runs td { padding: 6px 10px; }

      .modal-overlay { padding: 0; }
      .modal {
        max-height: 100dvh;
        border-radius: 0;
      }
      .modal-header { border-radius: 0; }
      .modal-body { padding: 16px; }
      .detail-table { font-size: 0.76rem; }
      .detail-table th, .detail-table td { padding: 6px 8px; }
      .modal-summary { grid-template-columns: repeat(3, 1fr); }
    }

    /* Ultra-narrow */
    @media (max-width: 380px) {
      .kpi-hero { gap: 8px; }
      .kpi-value { font-size: 1.5rem; }
      .kpi-card { padding: 14px 10px; }
      .kpi-label { font-size: 0.72rem; }
      .kpi-sub { font-size: 0.66rem; }
      .phase-chart-container { height: 200px; }
      .phase-header { padding: 12px 14px; min-height: 56px; }
      .phase-name { font-size: 0.92rem; }
      .phase-score { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <header>
    <img class="logo" src="/static/logo-on-dark.svg" alt="HAPI" aria-hidden="true">
    <div class="header-text">
      <h1>Data Statistikk</h1>
      <p>Eval-resultater over tid</p>
    </div>
    <a class="header-back" href="/" aria-label="Tilbake til chat">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>
      <span class="back-text">Tilbake til chat</span>
    </a>
  </header>

  <div class="container">
    <!-- KPI Hero -->
    <div id="kpiHero" class="kpi-hero"></div>

    <!-- Phase Timeline Chart -->
    <div class="phase-timeline">
      <h2>Utvikling per fase</h2>
      <p class="subtitle">Gjennomsnittlig korrekthetsscore per fase med trend</p>
      <div class="phase-chart-container">
        <canvas id="phaseChart"></canvas>
      </div>
    </div>

    <!-- Phase Accordion -->
    <div id="phaseAccordion">
      <div class="loading-state">
        <div class="spinner"></div>
        Henter eval-data...
      </div>
    </div>
  </div>

  <!-- Drill-down modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()" role="dialog" aria-labelledby="modalTitle" aria-modal="true">
    <div class="modal">
      <div class="modal-header">
        <div>
          <h2 id="modalTitle">Rapport</h2>
          <p id="modalSubtitle"></p>
        </div>
        <button class="modal-close" onclick="closeModal()" aria-label="Lukk rapport">&times;</button>
      </div>
      <div class="modal-body" id="modalBody">
        <div class="loading-state"><div class="spinner"></div>Henter detaljer...</div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    // Phase descriptions
    const PHASE_INFO = {
      'pre':   { label: 'Baseline',  desc: 'Innledende tester foer faseinndeling' },
      'fase1': { label: 'Fase 1',    desc: 'Keyword-routing og grunnleggende agenter' },
      'fase2': { label: 'Fase 2',    desc: 'Kildehenvisninger og stabilitetstest' },
      'fase3': { label: 'Fase 3',    desc: 'Soekestrategi, anti-hallusinering, klinisk presisjon' },
      'fase4': { label: 'Fase 4',    desc: 'Konsensus-eval, routing-optimalisering, kodeverk' },
      'fase5': { label: 'Fase 5',    desc: 'MCP-fikser, retningslinje v19, klinisk beskyttelse' },
      'fase6': { label: 'Fase 6',    desc: 'Validering og stabilitetstest' },
      'fase7': { label: 'Fase 7',    desc: 'Vector store og hybrid soek' },
      'fase8': { label: 'Fase 8',    desc: 'Agentic retrieval, EVAL-001 og EVAL-020 fikser' },
    };

    // --- Data loading & grouping ---

    async function loadData() {
      const resp = await fetch(`${API_BASE}/api/evals/summary`);
      const data = await resp.json();
      return data.reports;
    }

    // Date-based phase boundaries. When a tag is missing/ambiguous, we fall back to these.
    // Format: {phase, from} where "from" is the earliest timestamp that belongs to the phase.
    const PHASE_DATE_RANGES = [
      { phase: 'pre',   from: '0000-00-00T00:00:00' },
      { phase: 'fase1', from: '2026-03-28T18:00:00' },
      { phase: 'fase2', from: '2026-03-29T16:00:00' },
      { phase: 'fase3', from: '2026-03-29T22:30:00' },
      { phase: 'fase4', from: '2026-04-01T19:00:00' },
      { phase: 'fase5', from: '2026-04-04T14:00:00' },
      { phase: 'fase6', from: '2026-04-07T00:00:00' },
      { phase: 'fase7', from: '2026-04-14T00:00:00' },
      { phase: 'fase8', from: '2026-04-15T23:00:00' },
    ];

    function phaseFromDate(tidspunkt) {
      if (!tidspunkt) return 'pre';
      let current = 'pre';
      for (const range of PHASE_DATE_RANGES) {
        if (tidspunkt >= range.from) current = range.phase;
        else break;
      }
      return current;
    }

    function detectPhase(tag, tidspunkt) {
      // 1) Explicit fase tag wins
      if (tag) {
        const m = tag.match(/fase(\d+)/i);
        if (m) return 'fase' + m[1];
        // Explicit early-phase markers (predates fase-tagging convention)
        if (/v[12]-keyword|v2-llm-baseline|post-mcp-fix|smarttruncate/i.test(tag)) return 'pre';
        if (/clinical-protect|adaptive|120k/i.test(tag)) return 'fase5';
      }
      // 2) Fall back to date — handles untagged reports + non-fase tags
      // (e.g. "eval001-fixed", "eval020-v21-r1", "retest", "run1", etc.)
      return phaseFromDate(tidspunkt);
    }

    function groupByPhase(reports) {
      const groups = {};
      reports.forEach(r => {
        const phase = detectPhase(r.tag, r.tidspunkt);
        if (!groups[phase]) groups[phase] = [];
        groups[phase].push(r);
      });
      // Sort phases
      const order = ['pre','fase1','fase2','fase3','fase4','fase5','fase6','fase7','fase8'];
      const sorted = {};
      order.forEach(p => { if (groups[p]) sorted[p] = groups[p]; });
      // Any unknown phases
      Object.keys(groups).forEach(p => { if (!sorted[p]) sorted[p] = groups[p]; });
      return sorted;
    }

    function phaseStats(runs) {
      const scores = runs.map(r => r.korrekthet_pct).filter(x => x != null);
      const avg = scores.length ? Math.round(scores.reduce((a,b) => a+b, 0) / scores.length) : 0;
      const best = scores.length ? Math.max(...scores) : 0;
      const worst = scores.length ? Math.min(...scores) : 0;
      const totalHall = runs.reduce((s,r) => s + (r.hallusinering || 0), 0);
      const totalBestatt = runs.reduce((s,r) => s + (r.bestatt || 0), 0);
      const totalDelvis = runs.reduce((s,r) => s + (r.delvis || 0), 0);
      const totalMangler = runs.reduce((s,r) => s + (r.mangler || 0), 0);
      const totalFeil = runs.reduce((s,r) => s + (r.feil || 0), 0);
      const total = totalBestatt + totalDelvis + totalMangler + totalFeil;
      return { avg, best, worst, totalHall, totalBestatt, totalDelvis, totalMangler, totalFeil, total, scores };
    }

    // --- KPI Hero ---

    function renderKPI(reports, phases) {
      const last5 = reports.slice(-5);
      const last5Avg = last5.length
        ? Math.round(last5.reduce((s,r) => s + (r.korrekthet_pct || 0), 0) / last5.length)
        : 0;
      const latest = reports.length ? reports[reports.length - 1] : null;
      const totalRuns = reports.length;
      const totalHall = reports.reduce((s,r) => s + (r.hallusinering || 0), 0);

      // Phase count
      const phaseKeys = Object.keys(phases);
      const latestPhase = phaseKeys[phaseKeys.length - 1] || '-';
      const latestPhaseInfo = PHASE_INFO[latestPhase] || { label: latestPhase };

      document.getElementById('kpiHero').innerHTML = `
        <div class="kpi-card highlight">
          <div class="kpi-value">${last5Avg}%</div>
          <div class="kpi-label">Naaværende nivaa</div>
          <div class="kpi-sub">Snitt siste 5 evalueringer</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value green">${latest ? latest.korrekthet_pct + '%' : '-'}</div>
          <div class="kpi-label">Siste evaluering</div>
          <div class="kpi-sub">${latest ? (latest.tag || '') : ''}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value">${totalRuns}</div>
          <div class="kpi-label">Totalt evalueringer</div>
          <div class="kpi-sub">${phaseKeys.length} faser</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value ${totalHall > 0 ? 'red' : 'green'}">${totalHall}</div>
          <div class="kpi-label">Hallusinasjoner totalt</div>
          <div class="kpi-sub">Over alle kjoeringer</div>
        </div>
      `;
    }

    // --- Phase Chart ---

    function renderPhaseChart(phases) {
      const canvas = document.getElementById('phaseChart');
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);
      const W = rect.width, H = rect.height;

      const pad = { top: 24, right: 30, bottom: 50, left: 50 };
      const chartW = W - pad.left - pad.right;
      const chartH = H - pad.top - pad.bottom;

      const phaseKeys = Object.keys(phases);
      if (phaseKeys.length === 0) return;

      const phaseData = phaseKeys.map(k => ({
        key: k,
        info: PHASE_INFO[k] || { label: k, desc: '' },
        stats: phaseStats(phases[k]),
        runs: phases[k],
      }));

      // Accessibility: dynamic aria-label describing chart contents
      const ariaSummary = phaseData.map(pd => `${pd.info.label}: ${pd.stats.avg}%`).join(', ');
      canvas.setAttribute('role', 'img');
      canvas.setAttribute('aria-label', `Gjennomsnittlig korrekthetsscore per fase. ${ariaSummary}.`);

      // Background
      ctx.fillStyle = '#fafcfc';
      ctx.fillRect(0, 0, W, H);

      // Grid
      ctx.strokeStyle = '#e5e7eb';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      for (let pct = 0; pct <= 100; pct += 25) {
        const y = pad.top + chartH - (pct / 100) * chartH;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(W - pad.right, y);
        ctx.stroke();
        ctx.fillStyle = '#5a7272';
        ctx.font = '11px Segoe UI, system-ui, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(pct + '%', pad.left - 8, y + 4);
      }
      ctx.setLineDash([]);

      const barW = Math.min(60, chartW / phaseData.length * 0.6);
      const step = chartW / phaseData.length;

      phaseData.forEach((pd, i) => {
        const cx = pad.left + step * i + step / 2;
        const avg = pd.stats.avg;
        const best = pd.stats.best;
        const worst = pd.stats.worst;

        // Range bar (worst to best)
        if (pd.stats.scores.length > 1) {
          const yTop = pad.top + chartH - (best / 100) * chartH;
          const yBot = pad.top + chartH - (worst / 100) * chartH;
          ctx.fillStyle = 'rgba(13,110,110,0.1)';
          ctx.beginPath();
          ctx.roundRect(cx - barW/2, yTop, barW, yBot - yTop, 4);
          ctx.fill();

          // Range whiskers
          ctx.strokeStyle = 'rgba(13,110,110,0.3)';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(cx - barW/4, yTop);
          ctx.lineTo(cx + barW/4, yTop);
          ctx.moveTo(cx, yTop);
          ctx.lineTo(cx, yBot);
          ctx.moveTo(cx - barW/4, yBot);
          ctx.lineTo(cx + barW/4, yBot);
          ctx.stroke();
        }

        // Average bar
        const yAvg = pad.top + chartH - (avg / 100) * chartH;
        const barHeight = (avg / 100) * chartH;

        // Gradient fill
        const grad = ctx.createLinearGradient(0, yAvg, 0, pad.top + chartH);
        const hue = avg >= 95 ? '158' : avg >= 85 ? '170' : avg >= 70 ? '45' : '0';
        const sat = avg >= 95 ? '60%' : avg >= 85 ? '50%' : '70%';
        grad.addColorStop(0, `hsla(${hue}, ${sat}, 45%, 0.8)`);
        grad.addColorStop(1, `hsla(${hue}, ${sat}, 45%, 0.3)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(cx - barW/2, yAvg, barW, barHeight, [4,4,0,0]);
        ctx.fill();

        // Average value label
        ctx.fillStyle = '#1a2e2e';
        ctx.font = 'bold 12px Segoe UI, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(avg + '%', cx, yAvg - 8);

        // X-axis label
        ctx.fillStyle = '#5a7272';
        ctx.font = '11px Segoe UI, system-ui, sans-serif';
        ctx.textAlign = 'center';
        const label = pd.info.label;
        ctx.fillText(label, cx, pad.top + chartH + 18);

        // Run count
        ctx.fillStyle = '#9ca3af';
        ctx.font = '10px Segoe UI, system-ui, sans-serif';
        ctx.fillText(pd.runs.length + ' runs', cx, pad.top + chartH + 32);
      });

      // Trend line connecting averages
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(13,110,110,0.6)';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      phaseData.forEach((pd, i) => {
        const cx = pad.left + step * i + step / 2;
        const y = pad.top + chartH - (pd.stats.avg / 100) * chartH;
        if (i === 0) ctx.moveTo(cx, y);
        else ctx.lineTo(cx, y);
      });
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // --- Phase Accordion ---

    function togglePhase(btn) {
      const group = btn.parentElement;
      const isOpen = group.classList.toggle('open');
      btn.setAttribute('aria-expanded', String(isOpen));
    }

    function renderAccordion(phases, reports) {
      const phaseKeys = Object.keys(phases);
      const html = phaseKeys.map((key, pi) => {
        const runs = phases[key];
        const stats = phaseStats(runs);
        const info = PHASE_INFO[key] || { label: key, desc: '' };
        const isLast = pi === phaseKeys.length - 1;

        // Sparkline SVG
        const sparkSvg = renderSparklineSVG(stats.scores);

        // Score color
        const scoreColor = stats.avg >= 95 ? '#16a34a' : stats.avg >= 85 ? '#0d6e6e' : stats.avg >= 70 ? '#ca8a04' : '#dc2626';

        // Aggregate bar widths
        const total = stats.total || 1;
        const bPct = (stats.totalBestatt / total * 100).toFixed(1);
        const dPct = (stats.totalDelvis / total * 100).toFixed(1);
        const mPct = (stats.totalMangler / total * 100).toFixed(1);
        const fPct = (stats.totalFeil / total * 100).toFixed(1);

        // Run table rows
        const runRows = runs.slice().reverse().map(r => {
          const t = r.total || r.antall || 1;
          const barHtml = `
            <div class="score-bar">
              <div class="seg-bestatt" style="width:${(r.bestatt/t)*100}%"></div>
              <div class="seg-delvis" style="width:${(r.delvis/t)*100}%"></div>
              <div class="seg-mangler" style="width:${((r.mangler||0)/t)*100}%"></div>
              <div class="seg-feil" style="width:${(r.feil/t)*100}%"></div>
            </div>`;
          const date = r.tidspunkt ? r.tidspunkt.substring(5, 16).replace('T', ' ') : '-';
          const tag = r.tag ? r.tag.replace(/fase\d+-?/i, '') : '';
          const hallHtml = r.hallusinering > 0
            ? `<span class="hall-dot" aria-hidden="true"></span> <span aria-label="${r.hallusinering} hallusinasjoner">${r.hallusinering}</span>`
            : '<span style="color:#9ca3af">0</span>';
          return `<tr tabindex="0" onclick="openReport('${esc(r.file)}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openReport('${esc(r.file)}')}">
            <td style="white-space:nowrap">${esc(date)}</td>
            <td class="col-secondary">${tag ? '<span class="tag-chip">' + esc(tag) + '</span>' : ''}</td>
            <td style="font-weight:600;color:${r.korrekthet_pct >= 95 ? '#16a34a' : r.korrekthet_pct >= 85 ? '#0d6e6e' : '#ca8a04'}">${r.korrekthet_pct != null ? r.korrekthet_pct + '%' : '-'}</td>
            <td>${barHtml}</td>
            <td class="col-secondary" style="color:#16a34a">${r.bestatt}</td>
            <td class="col-secondary" style="color:#ca8a04">${r.delvis}</td>
            <td class="col-secondary" style="color:#dc2626">${r.feil}</td>
            <td>${hallHtml}</td>
            <td class="col-secondary">${r.antall}</td>
          </tr>`;
        }).join('');

        const barAriaLabel = `Bestaatt ${bPct}%, Delvis ${dPct}%, Mangler ${mPct}%, Feil ${fPct}%`;

        return `
        <div class="phase-group${isLast ? ' open' : ''}" data-phase="${key}">
          <button type="button" class="phase-header" aria-expanded="${isLast ? 'true' : 'false'}" aria-controls="phase-body-${key}" onclick="togglePhase(this)">
            <svg class="phase-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
            <div class="phase-name">${esc(info.label)}</div>
            <div class="phase-meta">
              <span>${runs.length} evalueringer</span>
              <span>${stats.totalHall > 0 ? stats.totalHall + ' hall.' : '0 hall.'}</span>
              <div class="phase-bar" role="img" aria-label="${barAriaLabel}">
                <div class="seg-b" style="width:${bPct}%"></div>
                <div class="seg-d" style="width:${dPct}%"></div>
                <div class="seg-m" style="width:${mPct}%"></div>
                <div class="seg-f" style="width:${fPct}%"></div>
              </div>
            </div>
            <div class="phase-sparkline" aria-hidden="true">${sparkSvg}</div>
            <div class="phase-score" style="color:${scoreColor}" aria-label="Gjennomsnitt ${stats.avg} prosent">${stats.avg}%</div>
          </button>
          <div class="phase-body" id="phase-body-${key}">
            ${info.desc ? '<div class="phase-desc">' + esc(info.desc) + '</div>' : ''}
            <div class="phase-runs-wrap">
              <table class="phase-runs">
                <thead><tr>
                  <th>Dato</th>
                  <th class="col-secondary">Tag</th>
                  <th>Score</th>
                  <th>Fordeling</th>
                  <th class="col-secondary">OK</th>
                  <th class="col-secondary">Delvis</th>
                  <th class="col-secondary">Feil</th>
                  <th>Hall.</th>
                  <th class="col-secondary">N</th>
                </tr></thead>
                <tbody>${runRows}</tbody>
              </table>
            </div>
          </div>
        </div>`;
      }).join('');

      document.getElementById('phaseAccordion').innerHTML = html;
    }

    function renderSparklineSVG(scores) {
      if (scores.length < 2) {
        return '<svg viewBox="0 0 120 32" style="width:100%;height:100%"><text x="60" y="20" text-anchor="middle" font-size="10" fill="#9ca3af">' + (scores[0] || '-') + '%</text></svg>';
      }

      const w = 120, h = 32, padY = 4;
      const min = Math.min(...scores) - 2;
      const max = Math.max(...scores) + 2;
      const range = max - min || 1;

      const pts = scores.map((s, i) => {
        const x = (i / (scores.length - 1)) * w;
        const y = h - padY - ((s - min) / range) * (h - padY * 2);
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      });

      const areaPath = `M0,${h} L${pts.join(' L')} L${w},${h} Z`;
      const linePath = `M${pts.join(' L')}`;

      return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:100%" preserveAspectRatio="none">
        <defs>
          <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgba(13,110,110,0.2)"/>
            <stop offset="100%" stop-color="rgba(13,110,110,0.02)"/>
          </linearGradient>
        </defs>
        <path d="${areaPath}" fill="url(#sparkGrad)"/>
        <path d="${linePath}" fill="none" stroke="#0d6e6e" stroke-width="1.5"/>
        <circle cx="${pts[pts.length-1].split(',')[0]}" cy="${pts[pts.length-1].split(',')[1]}" r="2.5" fill="#0d6e6e"/>
      </svg>`;
    }

    // --- Drill-down modal ---

    function esc(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    async function openReport(filename) {
      const overlay = document.getElementById('modalOverlay');
      const body = document.getElementById('modalBody');
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
      body.innerHTML = '<div class="loading-state"><div class="spinner"></div>Henter detaljer...</div>';

      try {
        const resp = await fetch(`${API_BASE}/api/evals/report/${encodeURIComponent(filename)}`);
        if (!resp.ok) throw new Error('Kunne ikke hente rapport');
        const data = await resp.json();
        renderModal(data, filename);
      } catch (err) {
        body.innerHTML = `<p style="color:#dc2626;padding:24px;text-align:center;">${esc(err.message)}</p>`;
      }
    }

    function scoreClass(score) {
      if (!score) return '';
      const s = score.toLowerCase().replace('feil_teknisk', 'feil');
      if (s.includes('bestatt')) return 'bestatt';
      if (s.includes('delvis')) return 'delvis';
      if (s.includes('mangler')) return 'mangler';
      if (s.includes('feil')) return 'feil';
      if (s.includes('hallusinering')) return 'hallusinering';
      return '';
    }

    function renderModal(data, filename) {
      const meta = data.metadata || {};
      const resultater = data.resultater || [];

      document.getElementById('modalTitle').textContent = meta.tag || filename;
      document.getElementById('modalSubtitle').textContent =
        (meta.tidspunkt ? meta.tidspunkt.substring(0, 16).replace('T', ' ') : '') +
        (meta.versjon ? '  —  ' + meta.versjon : '');

      const total = resultater.length;
      const counts = { bestatt: 0, delvis: 0, mangler: 0, feil: 0, hallusinering: 0 };
      resultater.forEach(r => {
        const s = (r.score || r.consensus_score || '').toLowerCase();
        if (s.includes('bestatt')) counts.bestatt++;
        else if (s.includes('delvis')) counts.delvis++;
        else if (s.includes('mangler')) counts.mangler++;
        else if (s.includes('hallusinering')) counts.hallusinering++;
        else if (s.includes('feil')) counts.feil++;
      });

      const detailRows = resultater.map((r, i) => {
        const score = r.score || r.consensus_score || '-';
        const cls = scoreClass(score);
        const tema = r.tema || r.kategori || '';
        const begrunnelse = r.begrunnelse || '';
        const answer = r.answer_preview || '';
        const routing = r.actual_routing || [];
        const routingOk = r.routing_correct !== false;

        let runsHtml = '';
        if (r.run_details && r.run_details.length > 0) {
          runsHtml = '<div style="margin-top:6px;"><strong style="font-size:0.72rem;color:var(--primary);">Kjoeredetaljer:</strong>' +
            r.run_details.map(rd =>
              `<div style="margin:4px 0;padding:4px 8px;background:#f8fafa;border-radius:4px;font-size:0.72rem;">` +
              `<span class="score-badge ${scoreClass(rd.score)}">${esc(rd.score)}</span> ` +
              `<span style="color:var(--text-light);">${(rd.duration_ms/1000).toFixed(1)}s</span>` +
              (rd.begrunnelse ? `<div class="detail-reasoning">${esc(rd.begrunnelse)}</div>` : '') +
              `</div>`
            ).join('') + '</div>';
        }

        const routingHtml = routing.length > 0
          ? `<div class="routing-info">${routing.map(a =>
              `<span class="routing-chip${routingOk ? '' : ' wrong'}">${esc(a.replace('hapi-','').replace('-agent',''))}</span>`
            ).join('')}</div>`
          : '';

        return `<tr class="expandable" onclick="this.classList.toggle('open')">
          <td style="white-space:nowrap">${esc(r.id || 'Q' + (i+1))}</td>
          <td>${esc(tema)}</td>
          <td><span class="score-badge ${cls}">${esc(score)}</span></td>
          <td>${routingHtml}</td>
          <td style="white-space:nowrap">${r.duration_ms ? (r.duration_ms/1000).toFixed(1) + 's' : '-'}</td>
          <td>
            ${begrunnelse ? `<div class="detail-reasoning">${esc(begrunnelse)}</div>` : ''}
            <div class="expand-content">
              ${answer ? `<div class="detail-answer">${esc(answer)}</div>` : ''}
              ${runsHtml}
            </div>
          </td>
        </tr>`;
      }).join('');

      document.getElementById('modalBody').innerHTML = `
        <div class="modal-summary">
          <div class="summary-card">
            <div class="value">${total}</div>
            <div class="label" style="font-size:0.76rem;color:var(--text-light);margin-top:4px">Spoersmaal</div>
          </div>
          <div class="summary-card">
            <div class="value green">${counts.bestatt}</div>
            <div class="label" style="font-size:0.76rem;color:var(--text-light);margin-top:4px">Bestatt</div>
          </div>
          <div class="summary-card">
            <div class="value" style="color:#ca8a04">${counts.delvis}</div>
            <div class="label" style="font-size:0.76rem;color:var(--text-light);margin-top:4px">Delvis</div>
          </div>
          <div class="summary-card">
            <div class="value" style="color:#c2410c">${counts.mangler}</div>
            <div class="label" style="font-size:0.76rem;color:var(--text-light);margin-top:4px">Mangler</div>
          </div>
          <div class="summary-card">
            <div class="value" style="color:#dc2626">${counts.feil}</div>
            <div class="label" style="font-size:0.76rem;color:var(--text-light);margin-top:4px">Feil</div>
          </div>
          <div class="summary-card">
            <div class="value" style="color:#be185d">${counts.hallusinering}</div>
            <div class="label" style="font-size:0.76rem;color:var(--text-light);margin-top:4px">Hallusinering</div>
          </div>
        </div>
        <table class="detail-table">
          <thead><tr>
            <th>ID</th><th>Tema</th><th>Score</th><th>Routing</th><th>Tid</th><th>Detaljer</th>
          </tr></thead>
          <tbody>${detailRows}</tbody>
        </table>
      `;
    }

    // --- Init ---

    async function init() {
      try {
        const reports = await loadData();
        const phases = groupByPhase(reports);
        renderKPI(reports, phases);
        renderPhaseChart(phases);
        renderAccordion(phases, reports);
        window.addEventListener('resize', () => renderPhaseChart(phases));
      } catch (err) {
        document.getElementById('phaseAccordion').innerHTML =
          `<p style="color:#dc2626;text-align:center;padding:24px;">Feil ved lasting: ${esc(err.message)}</p>`;
      }
    }

    init();
  </script>
</body>
</html>
